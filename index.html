<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Banco de Fotos – Ferretería Higuerillas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{--brand:#0000a2;--brand-lt:#e8e8ff;--accent:#cc0000;--white:#fff;--gray:#f4f4f8;--gray2:#e0e0ec;--text:#111122;--muted:#6666aa;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--white);color:var(--text);display:flex;flex-direction:column;height:100dvh;}

/* HEADER */
.ih{background:linear-gradient(135deg,var(--brand) 0%,#0033cc 100%);padding:24px 20px 20px;position:relative;overflow:hidden;flex-shrink:0;}
.ih::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);}
.ih-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1;}
.ih-left .bienvenido{color:rgba(255,255,255,.7);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.ilogo{height:64px;width:auto;object-fit:contain;flex-shrink:0;}

/* SEARCH BOX — always visible inside header */
.ih-search{position:relative;z-index:1;margin-top:18px;}
.ih-search label{display:block;color:rgba(255,255,255,.65);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.search-row{display:flex;gap:8px;}
.search-input{flex:1;border:none;border-radius:10px;padding:13px 16px;font-family:'Barlow',sans-serif;font-size:16px;font-weight:700;color:var(--brand);background:rgba(255,255,255,.95);outline:none;transition:background .15s,box-shadow .2s;}
.search-input::placeholder{color:#aab0d0;font-weight:500;}
.search-input:focus{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3);}
.btn-buscar{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 20px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:opacity .15s,transform .1s;}
.btn-buscar:hover{opacity:.88;transform:translateY(-1px);}

/* MAIN */
main{flex:1;overflow-y:auto;padding:20px 16px 32px;}





/* RESULTS */
.result-header{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
.photo-card{background:#fff;border-radius:14px;border:1.5px solid var(--gray2);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,102,.06);transition:box-shadow .2s,transform .15s;cursor:pointer;}
.photo-card:hover{box-shadow:0 8px 28px rgba(0,0,102,.14);transform:translateY(-2px);}
.photo-card img{width:100%;height:150px;object-fit:cover;display:block;background:var(--brand-lt);}
.img-placeholder{width:100%;height:150px;background:linear-gradient(135deg,#eef0fc,#dde1f5);display:flex;align-items:center;justify-content:center;font-size:36px;}
.photo-info{padding:11px 13px 9px;}
.photo-code{color:var(--brand);font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;}
.photo-desc{color:var(--text);font-size:14px;font-weight:600;margin-top:3px;line-height:1.3;}
.photo-meta{color:var(--muted);font-size:11px;margin-top:3px;}
.btn-report{display:block;width:calc(100% - 24px);margin:0 12px 11px;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:8px;padding:7px 0;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .15s,color .15s;}
.btn-report:hover{background:var(--accent);color:#fff;}

.empty-state,.initial-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-state .emoji,.initial-state .emoji{font-size:48px;margin-bottom:12px;}
.empty-state p,.initial-state p{font-size:14px;line-height:1.6;}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,80,.7);z-index:100;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:18px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,80,.4);animation:modalIn .22s ease;}
@keyframes modalIn{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{background:linear-gradient(135deg,var(--brand),#0033cc);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:1px;}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.modal-close:hover{background:rgba(255,255,255,.3);}
.modal-img{width:100%;max-height:260px;object-fit:contain;background:#f0f2f8;display:block;}
.modal-img-placeholder{width:100%;height:180px;background:linear-gradient(135deg,#eef0fc,#dde1f5);display:flex;align-items:center;justify-content:center;font-size:64px;}
.modal-body{padding:18px 20px 20px;}
.modal-code{color:var(--brand);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.modal-desc{color:var(--text);font-size:18px;font-weight:700;margin:5px 0 3px;}
.modal-meta{color:var(--muted);font-size:12px;margin-bottom:14px;}
.modal-url{background:#eef0fc;border-radius:8px;padding:9px 13px;font-size:12px;color:var(--brand);word-break:break-all;margin-bottom:14px;font-weight:600;}
.btn-report-modal{width:100%;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:10px;padding:11px 0;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .15s,color .15s;}
.btn-report-modal:hover{background:var(--accent);color:#fff;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#0000a2;color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:500px){
  .ilogo{height:50px;}
  .photo-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
}
</style>
</head>

  </div>
  <!-- BUSCADOR siempre visible -->
  <div class="ih-search">
    <label>Código de proveedor</label>
    <div class="search-row">
      <input class="search-input" id="search-input" type="text" placeholder="Ej: 250125" maxlength="30"
        onkeydown="if(event.key==='Enter') doSearch()"/>
      <button class="btn-buscar" onclick="doSearch()">BUSCAR</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- Results -->
  <div id="results">
    <div class="initial-state">
      <div class="emoji">🔍</div>
      <p>Ingresa un código de proveedor arriba<br>para ver las fotografías asociadas.</p>
    </div>
  </div>
</main>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Detalle</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modal-img-wrap"></div>
    <div class="modal-body">
      <div class="modal-code" id="modal-code"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-url" id="modal-url"></div>
      <button class="btn-report-modal" onclick="reportPhoto()">⚠️ Reportar Error en esta Foto</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let photosDB = [];

async function loadPhotos() {
  try {
    const res = await fetch('photos.json?nocache=' + Date.now());
    if (res.ok) photosDB = await res.json();
  } catch(e) { photosDB = []; }
}

(async function init() {
  await loadPhotos();
  const code = getCodeFromURL();
  if (code) {
    document.getElementById('search-input').value = code;
    doSearch();
  }
})();

function getCodeFromURL() {
  const path = window.location.pathname.replace(/^\/[^\/]+\//, '/');
  const slug = path.replace(/^\//, '').replace(/\/$/, '');
  if (slug && /^[\w-]+$/.test(slug) && slug !== 'index.html') return slug;
  const params = new URLSearchParams(window.location.search);
  if (params.get('code')) return params.get('code');
  return window.location.hash.replace('#', '') || null;
}

function doSearch() {
  const query = document.getElementById('search-input').value.trim().toUpperCase();
  if (!query) { showToast('Ingresa un código de proveedor'); return; }
  const base = window.location.pathname.replace(/\/[^\/]*$/, '/');
  history.pushState({}, '', base + query);
  const matches = photosDB.filter(p =>
    p.code.toUpperCase().includes(query) ||
    (p.supplier && p.supplier.toUpperCase().includes(query))
  );
  renderResults(matches, query);
}

function renderResults(items, query) {
  const el = document.getElementById('results');
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>No se encontraron fotos para <strong>' + query + '</strong>.<br>Sincroniza con Drive o verifica el código.</p></div>';
    return;
  }
  const baseURL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
  const itemsJson = JSON.stringify(items).replace(/"/g, '&quot;');
  el.innerHTML = '<div class="result-header">' + items.length + ' foto' + (items.length !== 1 ? 's' : '') + ' encontrada' + (items.length !== 1 ? 's' : '') + '</div>' +
    '<div class="photo-grid">' +
    items.map((p, i) =>
      '<div class="photo-card" onclick="openModal(' + i + ',' + itemsJson + ')">' +
      (p.url ? '<img src="' + p.url + '" alt="' + p.desc + '" loading="lazy" onerror="this.outerHTML='<div class=img-placeholder>🖼️</div>'">' : '<div class="img-placeholder">🖼️</div>') +
      '<div class="photo-info">' +
      '<div class="photo-code">' + p.code + '</div>' +
      '<div class="photo-desc">' + p.desc + '</div>' +
      '<div class="photo-meta">' + (p.filename || '') + '</div>' +
      '</div>' +
      '<button class="btn-report" onclick="event.stopPropagation();reportItem('' + p.code + '','' + p.desc.replace(/'/g, "\'") + '')">⚠️ Reportar Error</button>' +
      '</div>'
    ).join('') + '</div>';
}

let currentItem = null;
function openModal(idx, items) {
  currentItem = items[idx];
  const p = currentItem;
  const baseURL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
  document.getElementById('modal-title').textContent = p.code;
  document.getElementById('modal-code').textContent = 'Código: ' + p.code;
  document.getElementById('modal-desc').textContent = p.desc;
  document.getElementById('modal-meta').textContent = p.filename || '';
  document.getElementById('modal-url').textContent = baseURL + p.code;
  document.getElementById('modal-img-wrap').innerHTML = p.url
    ? '<img class="modal-img" src="' + p.url + '" alt="' + p.desc + '">'
    : '<div class="modal-img-placeholder">🖼️</div>';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }
function reportPhoto() { if (currentItem) reportItem(currentItem.code, currentItem.desc); }

function reportItem(code, desc) {
  const subject = encodeURIComponent('Error en foto – Código ' + code);
  const body = encodeURIComponent('Hola,\n\nSe reporta un error en la siguiente fotografía:\n\nCódigo: ' + code + '\nDescripción: ' + desc + '\n\nPor favor revisar y corregir.\n\nGracias.');
  window.location.href = 'mailto:christianr@fh.cl?subject=' + subject + '&body=' + body;
}


let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

window.addEventListener('popstate', async () => {
  const code = getCodeFromURL();
  if (code) { document.getElementById('search-input').value = code; doSearch(); }
  else {
    document.getElementById('results').innerHTML = '<div class="initial-state"><div class="emoji">🔍</div><p>Ingresa un código de proveedor arriba<br>para ver las fotografías asociadas.</p></div>';
  }
});
</script>
</body>
</html>
